server:
  port: 8080

spring:
  application:
    name: exam-v2-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${EXAM_DB_URL:jdbc:mysql://localhost:3306/exam?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${EXAM_DB_USERNAME:root}
    password: ${EXAM_DB_PASSWORD:123456}

mybatis:
  configuration:
    map-underscore-to-camel-case: true

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
